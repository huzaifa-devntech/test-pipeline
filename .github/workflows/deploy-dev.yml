name: Deploy to Development

# Runs only when a PR is merged into development (not on every push to development).
# Avoids redundant deploy when you push to development for other PRs (e.g. dev → staging).
on:
  pull_request:
    types: [closed]
    branches: [development]
  workflow_dispatch:

concurrency:
  group: deploy-development
  cancel-in-progress: false

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.pull_request.base.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NestJS app
        run: pnpm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/main.js" ]; then
            echo "Build failed - dist/main.js not found"
            ls -la dist/
            exit 1
          fi
          echo " Build successful - dist/main.js exists"
          echo " Build size:"
          du -sh dist/
  
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build]
    if: always()

    steps:
      - name: Check Deployment Status
        run: |
          echo "================================"
          echo "Deployment Pipeline Summary"
          echo "================================"
          echo "Build: ${{ needs.build.result }}"
          echo "================================"

          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ Deployment Failed"
            exit 1
          else
            echo "✅ Deployment Passed"
          fi