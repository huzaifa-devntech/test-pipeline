name: CI - Continuous Integration

on:
  pull_request:
    branches: [development, staging, main]
  # No push trigger = CI runs only once (when PR is opened/updated), not again on merge

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-ready:
    name: Check PR ready-to-merge
    runs-on: ubuntu-latest
    outputs:
      is_ready: ${{ steps.check.outputs.is_ready }}

    steps:
      - name: Determine if PR has approval and ready-to-merge label
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request"] && "${{ github.event_name }}" != "pull_request_review"]; then
            echo "is_ready=false" >> $GITHUB_OUTPUT
            echo "PR is not ready to merge"
            exit 0
          fi

          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          HAS_LABEL=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/labels" \
            | jq -r '[.[] | select(.name=="ready-to-merge")] | length')

          APPROVED=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            | jq -r '[.[] | select(.state=="APPROVED")] | length')

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check-ready
    if: steps.check-ready.outputs.is_ready == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

  build:
    name: Build Application
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NestJS app
        run: pnpm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/main.js" ]; then
            echo "Build failed - dist/main.js not found"
            ls -la dist/
            exit 1
          fi
          echo " Build successful - dist/main.js exists"
          echo " Build size:"
          du -sh dist/
  
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [check-ready, lint, typecheck, build]
    if: always() && needs.check-ready.outputs.is_ready == 'true'

    steps:
      - name: Check CI Status
        run: |
          echo "================================"
          echo "CI Pipeline Summary"
          echo "================================"
          echo "PR Ready: ${{ needs.check-ready.outputs.is_ready }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Type Check: ${{ needs.typecheck.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "================================"

          if [[ "${{ needs.check-ready.outputs.is_ready }}" == "false" ]] || 
             [[ "${{ needs.lint.result }}" == "failure" ]] || 
             [[ "${{ needs.typecheck.result }}" == "failure" ]] || 
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ CI Failed"
            exit 1
          else
            echo "✅ CI Passed"
          fi