name: Deploy to Staging

on:
  workflow_run:
    workflows: ["CI - Continuous Integration"]
    types: [completed]
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # ==========================================
  # CHECK CI PASSED
  # ==========================================
  check-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    
    steps:
      - name: CI Passed
        run: |
          echo "CI workflow completed successfully"
          echo "Proceeding with deployment..."

  build:
    name: Build Application
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [check-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NestJS app
        run: pnpm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/main.js" ]; then
            echo "Build failed - dist/main.js not found"
            ls -la dist/
            exit 1
          fi
          echo " Build successful - dist/main.js exists"
          echo " Build size:"
          du -sh dist/
  
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [check-ci, build]
    if: always()

    steps:
      - name: Check Deployment Status
        run: |
          echo "================================"
          echo "Deployment Pipeline Summary"
          echo "================================"
          echo "CI: ${{ needs.check-ci.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "================================"

          if [[ "${{ needs.check-ci.result }}" == "failure" ]] || 
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ Deployment Failed"
            exit 1
          else
            echo "✅ Deployment Passed"
          fi